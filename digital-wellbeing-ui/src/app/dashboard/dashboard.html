<h1>Digital Wellbeing Dashboard</h1>

<!-- Summary Cards -->
<div class="cards">
  <div class="card">
    <h3>Total Time</h3>
    <p>{{ (totalTime / 60).toFixed(2) }} min</p>
  </div>

  <div class="card">
    <h3>Top App</h3>
    <p>{{ topApp }}</p>
  </div>
</div>

<!-- Charts -->
<div class="charts">
  <div class="chart-box">
    <canvas id="barChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="pieChart"></canvas>
  </div>


</div>


<!--<div>
  <h2>Daily Timeline</h2>
  <canvas id="timelineChart"></canvas>
</div>-->
<!-- Timeline Section (Separate) -->
<div class="timeline-section">
  <h2>Daily Timeline</h2>
  <div class="timeline-box">
    <canvas id="timelineChart"></canvas>
  </div>
</div>


<h2>AI Insights</h2>

<div class="insights">
  <div *ngFor="let insight of insights" class="insight-card">
    {{ insight }}
  </div>
</div>
